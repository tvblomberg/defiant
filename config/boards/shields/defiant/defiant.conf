# Sleep configuration
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Boost BLE TX power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ZMK Studio support (runtime keymap editing)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# USB support
CONFIG_ZMK_USB=y

# BLE support
CONFIG_ZMK_BLE=y

# Mouse / pointing support (for &mkp and mouse movement)
CONFIG_ZMK_POINTING=y
